<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image, list, table</title>
</head>

<body>
    <h1>adding image in the html.</h1>
    <!-- image tag in html -->
    <img src="https://tse4.mm.bing.net/th/id/OIP.00rpkiYVxlZjlc4ikclutwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
        alt="iphone_image" style="width: 200px;">

    <!-- list tag in html -->
    <!-- 
    there are 2 types of list
      1. ordered list
      2. unordered list
       -->
    <!-- ordered list -->
    <ol>
        <li>apple</li>
        <li>banana</li>
        <li>papaya</li>
        <li>orange</li>
    </ol>
    <!-- unordered list -->
    <ul>
        <li>amit</li>
        <li>sumit</li>
        <li>chandrasekhar</li>
        <li>gautam</li>
        <li>sneha</li>
    </ul>

    <!-- table tag in html -->
    <table border="2" style="border-collapse: collapse; margin: 5px; padding: 5px;">
        <caption>this is table caption</caption>
        <thead>
            <tr>
                <th>name</th>
                <th>roll no.</th>
                <th>score</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>amit</td>
                <td>124</td>
                <td>98</td>
            </tr>
            <tr>
                <td>sumit</td>
                <td>542</td>
                <td>94</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3" style="text-align: center;">End of list</td>
            </tr>
        </tfoot>
    </table>
    <!-- <img src="/C.O.D.E/NOTES/Self/ESP 8266 Module pin diagram.jpg/" alt="ESP8266"> -->

    <!-- Inserting audio in HTML -->
    <h2>Embedding Audio tags in HTMl.</h2>
    <audio controls autoplay muted>
        <source src="sample-3s.mp3" type="audio/mpeg">
    </audio>

    <!-- embedding video inside HTML -->
    <video>
        <source src="sample-4.mp4" type="video/mp4">
    </video>
</body>

</html>
