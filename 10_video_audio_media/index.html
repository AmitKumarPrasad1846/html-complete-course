<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and video tags and iframe tag</title>
</head>

<body>
    <video src="Chidiya.mp4" width="300px" loop muted controls poster="poster.png" preload="auto"></video>
    <!-- <video src="Chidiya.mp4" width="300px" muted controls></video>
    <video src="Chidiya.mp4" width="300px" autoplay controls></video> -->
    <!-- here -- loop -- muted -- autoplay -- poster -- controls-- ye sab audio and video tag ke attributes hai -->

    <audio src="Aasa Kooda x Sadqay.mp3" preload="metadata" controls autoplay></audio>

    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg>

    <!-- SVG (Scalable Vector Graphics) is an XML-based format used to create vector images in HTML. -->
    <!-- Key Features of SVG:
    - Scalability – No loss of quality when resized.
    - Editable – Can be easily modified using CSS or JavaScript.
    - Lightweight – Smaller file sizes compared to many raster images.
    - Interactive – Supports animations and interactivity.     -->

    <iframe src="https://en.wikipedia.org/wiki/Taj_Mahal" frameborder="0" width="300px"></iframe>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=e8iOQwiI4Q5JUten"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>

    <!-- iframe tag is used to embed other websites -->




</body>

</html>
